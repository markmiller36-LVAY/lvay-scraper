services:
  - type: web
    name: lvay-football-scraper
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SEASON_YEAR
        value: 2026
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: lvay-data
      mountPath: /opt/render/project/src
      sizeGB: 1
